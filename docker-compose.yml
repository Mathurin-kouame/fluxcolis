services:

  # ==================
  # FRONTEND (React / Vite)
  frontend:
    build: ./frontend
    container_name: fluxcolis_ui
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL}

  # ===================
  # BACKEND (NestJS + Prisma)
  api:
    build: ./backend
    container_name: fluxcolis_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./.env

  # ===================
  # DATABASE (PostgreSQL)
  db:
    image: postgres:15
    container_name: fluxcolis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# ===================
# VOLUMES
volumes:
  postgres_data: