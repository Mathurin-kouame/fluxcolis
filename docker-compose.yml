services:
 
  frontend:
    build: ./frontend
    container_name: fluxcolis_ui
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules

  api:
    build: ./backend
    container_name: fluxcolis_api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      - db
    env_file:
      - .env

    volumes:
      - ./backend:/app
      - /app/node_modules

  db:
    image: postgres:15
    container_name: fluxcolis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
volumes:
  postgres_data: